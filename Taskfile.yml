version: '3'

vars:
  PYTHON_BIN_RAW: '{{default "python" .PYTHON_BIN}}'
  PYTHON_BIN: '{{quote (replace "\\" "/" .PYTHON_BIN_RAW)}}'
  PACMAN_AGENT: '{{default "" .PACMAN_AGENT}}'
  PACMAN_LAYOUT: '{{default "" .PACMAN_LAYOUT}}'
  PACMAN_GHOSTS: '{{default "" .PACMAN_GHOSTS}}'
  PACMAN_GAMES: '{{default "" .PACMAN_GAMES}}'
  PACMAN_PARALLEL: '{{default "" .PACMAN_PARALLEL}}'
  PACMAN_EXTRA_ARGS: '{{default "" .PACMAN_EXTRA_ARGS}}'

tasks:
  test:
    desc: Run full pytest suite
    cmds:
      - 'if command -v uv >/dev/null 2>&1; then uv run {{.PYTHON_BIN}} -m pytest -vv -s; else {{.PYTHON_BIN}} -m pytest -vv -s; fi'

  test:fast:
    desc: Run fast pytest suite (excluding slow)
    cmds:
      - 'if command -v uv >/dev/null 2>&1; then uv run {{.PYTHON_BIN}} -m pytest -m "not slow" -vv -s; else {{.PYTHON_BIN}} -m pytest -m "not slow" -vv -s; fi'

  test:slow:
    desc: Run slow pytest suite
    cmds:
      - 'if command -v uv >/dev/null 2>&1; then uv run {{.PYTHON_BIN}} -m pytest -m slow -vv -s; else {{.PYTHON_BIN}} -m pytest -m slow -vv -s; fi'

  test:q1:
    desc: Run only question q1
    env:
      PACMAN_QUESTIONS: q1
    cmds:
      - 'if command -v uv >/dev/null 2>&1; then uv run {{.PYTHON_BIN}} -m pytest -vv -s; else {{.PYTHON_BIN}} -m pytest -vv -s; fi'

  test:q2:
    desc: Run only question q2
    env:
      PACMAN_QUESTIONS: q2
    cmds:
      - 'if command -v uv >/dev/null 2>&1; then uv run {{.PYTHON_BIN}} -m pytest -vv -s; else {{.PYTHON_BIN}} -m pytest -vv -s; fi'

  test:q3:
    desc: Run only question q3
    env:
      PACMAN_QUESTIONS: q3
    cmds:
      - 'if command -v uv >/dev/null 2>&1; then uv run {{.PYTHON_BIN}} -m pytest -vv -s; else {{.PYTHON_BIN}} -m pytest -vv -s; fi'

  test:q4:
    desc: Run only question q4
    env:
      PACMAN_QUESTIONS: q4
    cmds:
      - 'if command -v uv >/dev/null 2>&1; then uv run {{.PYTHON_BIN}} -m pytest -vv -s; else {{.PYTHON_BIN}} -m pytest -vv -s; fi'

  test:q5:
    desc: Run only question q5
    env:
      PACMAN_QUESTIONS: q5
    cmds:
      - 'if command -v uv >/dev/null 2>&1; then uv run {{.PYTHON_BIN}} -m pytest -vv -s; else {{.PYTHON_BIN}} -m pytest -vv -s; fi'

  test:q2q3:
    desc: Run only questions q2 and q3
    env:
      PACMAN_QUESTIONS: q2,q3
    cmds:
      - 'if command -v uv >/dev/null 2>&1; then uv run {{.PYTHON_BIN}} -m pytest -vv -s; else {{.PYTHON_BIN}} -m pytest -vv -s; fi'

  run:pacman:
    desc: Run Pacman with interactive launcher (or skip with params)
    cmds:
      - 'ARGS=""; if [ -n "{{.PACMAN_AGENT}}" ]; then ARGS="$ARGS --agent {{.PACMAN_AGENT}}"; fi; if [ -n "{{.PACMAN_LAYOUT}}" ]; then ARGS="$ARGS --layout {{.PACMAN_LAYOUT}}"; fi; if [ -n "{{.PACMAN_GHOSTS}}" ]; then ARGS="$ARGS --ghosts {{.PACMAN_GHOSTS}}"; fi; if [ -n "{{.PACMAN_GAMES}}" ]; then ARGS="$ARGS --num-games {{.PACMAN_GAMES}}"; fi; if [ -n "{{.PACMAN_PARALLEL}}" ]; then ARGS="$ARGS --parallel {{.PACMAN_PARALLEL}}"; fi; if [ -n "{{.PACMAN_EXTRA_ARGS}}" ]; then ARGS="$ARGS {{.PACMAN_EXTRA_ARGS}}"; fi; if command -v uv >/dev/null 2>&1; then PYTHONPATH=src uv run {{.PYTHON_BIN}} -m app --python-bin {{.PYTHON_BIN}} $ARGS; else PYTHONPATH=src {{.PYTHON_BIN}} -m app --python-bin {{.PYTHON_BIN}} $ARGS; fi'
