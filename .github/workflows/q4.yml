name: CI Q4

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-q4:
    if: ${{ !(github.event_name == 'push' && startsWith(github.event.head_commit.message, '[skip ci]')) && !(github.event_name == 'pull_request' && startsWith(github.event.pull_request.title, '[skip ci]')) }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          pip install uv

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Install Task runner
        run: |
          sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b /usr/local/bin
          task --version

      - name: Run question q4
        env:
          PYTHONUNBUFFERED: "1"
          PYTHON_BIN: "python"
        run: |
          task test:q4